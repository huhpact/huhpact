<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Germany Plate Quiz</title>
    <link rel="stylesheet" href="/quiz/style.css">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <style>
        /* ── Plate stage ── */
        .plate-stage {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem 2rem;
            margin-bottom: 1.75rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 220px;
            box-shadow: var(--shadow-md);
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
        }

        .plate-stage::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(232,100,58,0.03) 0%, transparent 60%),
                radial-gradient(circle at 80% 50%, rgba(0,0,153,0.03) 0%, transparent 60%);
            pointer-events: none;
        }

        .plate-mode-label {
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            position: relative;
        }

        #plate-render {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        .plate-image-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: plateIn 0.38s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }

        @keyframes plateIn {
            from { opacity: 0; transform: perspective(600px) rotateX(18deg) scale(0.82); }
            to   { opacity: 1; transform: perspective(600px) rotateX(0deg) scale(1); }
        }

        .plate-image {
            width: 320px;
            height: auto;
            border-radius: 5px;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* ── Code badge shown below plate ── */
        .plate-code-badge {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            color: var(--text);
            font-family: 'Courier New', monospace;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.5rem 1.5rem;
            position: relative;
        }

        /* German plate style — shown as fallback or always */
        .plate-visual {
            background: #fff;
            border: 2.5px solid #000;
            border-radius: 6px;
            padding: 0.55rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 4px 18px rgba(0,0,0,0.25);
            animation: plateIn 0.38s cubic-bezier(0.34,1.4,0.64,1) both;
            min-width: 220px;
            justify-content: center;
        }

        .plate-eu-strip {
            background: #003399;
            color: #FFD700;
            border-radius: 3px 0 0 3px;
            padding: 2px 5px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            line-height: 1;
        }

        .plate-eu-stars {
            font-size: 0.55rem;
            letter-spacing: 0.5px;
        }

        .plate-code-text {
            font-family: 'FE-Schrift', 'Arial Black', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            color: #000;
            line-height: 1;
        }

        .plate-dots {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .plate-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #000;
        }

        .plate-random-num {
            font-family: 'FE-Schrift', 'Arial Black', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #000;
            line-height: 1;
        }

        .plate-error-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 8px 16px;
            border: 1px dashed var(--border);
            border-radius: 6px;
        }

        /* ── Input area ── */
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
        }

        .input-row {
            display: flex;
            gap: 0.6rem;
            width: 100%;
        }

        .plate-input {
            flex: 1;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.85rem 1.1rem;
            font-size: 1rem;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .plate-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,100,58,0.13);
        }

        .plate-input.correct {
            border-color: #22c55e;
            background: rgba(34,197,94,0.07);
            color: #22c55e;
        }

        .plate-input.incorrect {
            border-color: #ef4444;
            background: rgba(239,68,68,0.07);
            color: #ef4444;
        }

        .plate-input:disabled { opacity: 1; }

        .submit-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            padding: 0.85rem 1.4rem;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            white-space: nowrap;
            font-family: inherit;
        }

        .submit-btn:hover   { opacity: 0.88; }
        .submit-btn:active  { transform: scale(0.97); }
        .submit-btn:disabled { opacity: 0.4; cursor: default; }

        /* ── Feedback ── */
        .feedback-row {
            min-height: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .feedback-row.correct   { color: #22c55e; }
        .feedback-row.incorrect { color: #ef4444; }
        .feedback-row.hidden    { opacity: 0; }

        /* ── Hint ── */
        .hint-text {
            font-size: 0.82rem;
            color: var(--text-muted);
            text-align: center;
            min-height: 1.3em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quiz-top-bar">
            <div class="score-display">
                <span class="score-label">Score:</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="progress-display">
                <span id="current-question">1</span> / <span id="total-questions">10</span>
            </div>
        </div>

        <main class="quiz-container">
            <div class="plate-stage">
                <p class="plate-mode-label">Which district uses this plate code?</p>
                <div id="plate-render"></div>
            </div>

            <div class="input-area">
                <div class="input-row">
                    <input
                        type="text"
                        class="plate-input"
                        id="plate-answer"
                        placeholder="Type the district name…"
                        autocomplete="off"
                        autocorrect="off"
                        spellcheck="false"
                    />
                    <button class="submit-btn" id="submit-btn">Submit</button>
                </div>
                <div class="feedback-row hidden" id="feedback-row"></div>
                <div class="hint-text" id="hint-text"></div>
            </div>
        </main>
    </div>

    <div id="results-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="neon-text">Quiz Complete!</h2>
            <div class="results-stats">
                <div class="stat-item">
                    <span class="stat-value" id="final-score">0</span>
                    <span class="stat-label">Correct</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="final-total">10</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="final-percentage">0%</span>
                    <span class="stat-label">Accuracy</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn" onclick="window.location.href='quiz-germany-plates-setup.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    Try Again
                </button>
                <button class="modal-btn secondary" onclick="window.location.href='/quiz/index.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Back to Home
                </button>
            </div>
        </div>
    </div>

    <script src="germany-plates.js"></script>
    <script>
        var questions     = [];
        var current       = 0;
        var score         = 0;
        var answered      = false;
        var advanceTimer  = null;
        var countInterval = null;

        // Random plate numbers for visual
        var PLATE_NUMS = ['AB 1234', 'XY 567', 'MK 890', 'TS 42', 'WR 777'];

        document.addEventListener('DOMContentLoaded', function () {
            var total  = parseInt(sessionStorage.getItem('germanyPlatesQuestions')) || 10;
            var region = sessionStorage.getItem('germanyPlatesRegion') || 'all';

            var pool = region === 'all'
                ? germanyPlates.slice()
                : germanyPlates.filter(function(p){ return p.region === region; });

            if (pool.length < 1) {
                alert('Not enough entries for this region.');
                window.location.href = 'quiz-germany-plates-setup.html';
                return;
            }

            // Shuffle
            for (var i = pool.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
            }

            questions = pool.slice(0, Math.min(total, pool.length));
            document.getElementById('total-questions').textContent = questions.length;

            // Events — registered once
            document.getElementById('plate-answer').addEventListener('keydown', function(e){
                if (e.key === 'Enter') { e.preventDefault(); submitAnswer(); }
            });
            document.getElementById('submit-btn').addEventListener('click', function(){
                submitAnswer();
            });

            loadQuestion();
        });

        function loadQuestion() {
            if (current >= questions.length) { showResults(); return; }

            answered = false;
            if (advanceTimer  !== null) { clearTimeout(advanceTimer);   advanceTimer  = null; }
            if (countInterval !== null) { clearInterval(countInterval); countInterval = null; }

            var q = questions[current];
            document.getElementById('current-question').textContent = current + 1;

            // Build plate visual
            var render = document.getElementById('plate-render');
            render.innerHTML = '';

            var img = document.getElementById('plate-render');

            // Try real image first, fall back to CSS plate visual
            var wrapper = document.createElement('div');
            wrapper.className = 'plate-image-wrapper';

            var imgEl = document.createElement('img');
            imgEl.className = 'plate-image';
            imgEl.alt = q.code + ' license plate';

            // Random number suffix for visual realism
            var rndNums = ['· AB 1234', '· XY 567', '· MK 89', '· TS 42 H', '· WR 777'];
            var rndSuffix = rndNums[Math.floor(Math.random() * rndNums.length)];

            imgEl.onerror = function() {
                imgEl.onerror = null;
                imgEl.style.display = 'none';
                var err = document.createElement('div');
                err.className = 'plate-error-msg';
                err.textContent = '⚠ Bild nicht gefunden: ' + q.code + '.png';
                wrapper.appendChild(err);
            };

            // Dateiname direkt aus dem filename-Feld (exakt wie im Verzeichnis)
            var fileName = q.filename || q.code.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue');
            imgEl.src = '/quiz/germany-plates/plates-img/' + fileName + '.png';
            wrapper.appendChild(imgEl);
            render.appendChild(wrapper);

            // Reset input
            var input = document.getElementById('plate-answer');
            input.value       = '';
            input.disabled    = false;
            input.className   = 'plate-input';
            input.placeholder = 'Type the district name…';

            var btn = document.getElementById('submit-btn');
            btn.disabled    = false;
            btn.textContent = 'Submit';

            var fb = document.getElementById('feedback-row');
            fb.textContent = '';
            fb.className   = 'feedback-row hidden';
            document.getElementById('hint-text').textContent = '';

            setTimeout(function(){ input.focus(); }, 80);
        }

        function buildCSSPlate(code) {
            var div = document.createElement('div');
            div.className = 'plate-visual';

            // EU blue strip
            var strip = document.createElement('div');
            strip.className = 'plate-eu-strip';
            strip.innerHTML = '<span class="plate-eu-stars">★★★</span><span>D</span><span class="plate-eu-stars">★★★</span>';

            // Dots
            var dots = document.createElement('div');
            dots.className = 'plate-dots';
            dots.innerHTML = '<div class="plate-dot"></div><div class="plate-dot"></div>';

            // Code
            var codeEl = document.createElement('span');
            codeEl.className = 'plate-code-text';
            codeEl.textContent = code;

            // Dots
            var dots2 = document.createElement('div');
            dots2.className = 'plate-dots';
            dots2.innerHTML = '<div class="plate-dot"></div><div class="plate-dot"></div>';

            // Random number
            var nums = ['AB 1234', 'XY 567', 'MK 89', 'TS 42 H', 'WR 777'];
            var numEl = document.createElement('span');
            numEl.className = 'plate-random-num';
            numEl.textContent = nums[Math.floor(Math.random() * nums.length)];

            div.appendChild(strip);
            div.appendChild(dots);
            div.appendChild(codeEl);
            div.appendChild(dots2);
            div.appendChild(numEl);
            return div;
        }

        function submitAnswer() {
            if (answered) { advance(); return; }

            var input = document.getElementById('plate-answer');
            var raw   = input.value.trim();
            if (!raw) return;

            answered      = true;
            input.disabled = true;

            var q       = questions[current];
            var isRight = checkAnswer(raw, q);

            var fb = document.getElementById('feedback-row');
            if (isRight) {
                score++;
                document.getElementById('score').textContent = score;
                input.classList.add('correct');
                fb.textContent = '✓ Correct! ' + q.code + ' = ' + q.name;
                fb.className   = 'feedback-row correct';
            } else {
                input.classList.add('incorrect');
                fb.textContent = '✗ It was ' + q.name + ' (' + q.code + ')';
                fb.className   = 'feedback-row incorrect';
                document.getElementById('hint-text').textContent = q.name;
            }

            var btn       = document.getElementById('submit-btn');
            btn.disabled  = false;
            var delay     = isRight ? 1800 : 2500;
            var remaining = Math.ceil(delay / 1000);
            btn.textContent = 'Next (' + remaining + ')';

            countInterval = setInterval(function() {
                remaining--;
                if (remaining > 0) {
                    btn.textContent = 'Next (' + remaining + ')';
                } else {
                    clearInterval(countInterval);
                    countInterval = null;
                }
            }, 1000);

            advanceTimer = setTimeout(function() { advance(); }, delay);
        }

        function checkAnswer(raw, q) {
            var given   = normalise(raw);
            var correct = normalise(q.name);

            if (given === correct) return true;
            if (fuzzy(given, correct)) return true;

            // Check aliases
            if (q.aliases) {
                for (var i = 0; i < q.aliases.length; i++) {
                    var a = normalise(q.aliases[i]);
                    if (given === a || fuzzy(given, a)) return true;
                }
            }

            return false;
        }

        function normalise(str) {
            return str
                .toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')  // strip umlauts/accents
                .replace(/[äáàâ]/g, 'a')
                .replace(/[öóòô]/g, 'o')
                .replace(/[üúùû]/g, 'u')
                .replace(/ß/g, 'ss')
                .replace(/[-–—\/\(\)\.]/g, ' ')  // hyphens, parens → space
                .replace(/\s+/g, ' ')
                .trim();
        }

        function fuzzy(given, correct) {
            // Strip all non-alphanumeric for loose comparison
            var g = given.replace(/[^a-z0-9]/g, '');
            var c = correct.replace(/[^a-z0-9]/g, '');
            if (g === c) return true;
            // Accept if given contains full correct or vice-versa (min 4 chars)
            if (g.length >= 4 && c.includes(g)) return true;
            if (c.length >= 4 && g.includes(c)) return true;
            return false;
        }

        function advance() {
            if (advanceTimer  !== null) { clearTimeout(advanceTimer);   advanceTimer  = null; }
            if (countInterval !== null) { clearInterval(countInterval); countInterval = null; }
            current++;
            loadQuestion();
        }

        function showResults() {
            var pct = Math.round((score / questions.length) * 100);
            document.getElementById('final-score').textContent      = score;
            document.getElementById('final-total').textContent      = questions.length;
            document.getElementById('final-percentage').textContent = pct + '%';
            document.getElementById('results-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
